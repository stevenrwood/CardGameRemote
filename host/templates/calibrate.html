<!DOCTYPE html>
<html><head><title>Calibrate</title>
<style>
body{font-family:sans-serif;background:#1a1a2e;color:#e0e0e0;padding:20px;margin:0}
canvas{border:1px solid #444;cursor:crosshair;display:block;margin:10px 0;max-width:100%}
#status{font-size:1.2em;color:#4fc3f7;margin:10px 0}
button{padding:8px 16px;background:#e94560;color:#fff;border:none;border-radius:6px;cursor:pointer;margin:5px}
</style></head><body>
<h1>Calibration</h1>
<div id="status">Loading image...</div>
<div style="margin:8px 0;display:flex;align-items:center;gap:10px">
  <label>Brio focus <span id="focus-val">auto</span></label>
  <input id="focus" type="range" min="0" max="255" value="0"
         style="flex:1;max-width:400px" oninput="onFocus(this.value)">
  <button onclick="onFocus(null)" style="padding:4px 10px">Auto</button>
  <button onclick="reloadImage()" style="padding:4px 10px">Refresh Image</button>
</div>
<canvas id="canvas"></canvas>
<button onclick="location.href='/'">Back</button>
<script>
var c=document.getElementById('canvas'),ctx=c.getContext('2d');
var players=$players_js;
var _initFocus=$focus_init_js;
(function(){
  var slider=document.getElementById('focus');
  var label=document.getElementById('focus-val');
  if(_initFocus!==null&&_initFocus!==undefined){
    slider.value=_initFocus;label.textContent=_initFocus;
  } else {
    label.textContent='auto';
  }
})();
// Per-step wizard state. Steps:
//   cc   click felt center
//   ce   click felt edge
//   sc1  click first 8-inch reference mark
//   sc2  click second 8-inch reference mark (sets zone_radius_px)
//   zone drag-and-drop a fixed 8" zone onto the player's seat
var steps=[],step=0,cc=null,cr=null,zoneR=null,zones=[],sc1=null;
var dragPos=null,scaleP1=null,imgW=0,imgH=0;
steps.push({p:'Click CENTER of felt circle',t:'cc'});
steps.push({p:"Click EDGE of felt circle (at Bill's position)",t:'ce'});
steps.push({p:'Click FIRST mark of the 8-inch reference',t:'sc1'});
steps.push({p:'Click SECOND mark of the 8-inch reference',t:'sc2'});
players.forEach(function(n){
  steps.push({p:'Press, drag, and release to drop '+n+"'s zone",t:'zone',n:n});
});

var img=new Image();
img.onload=function(){
  imgW=img.naturalWidth;imgH=img.naturalHeight;
  var sc=Math.min((window.innerWidth-40)/imgW,1);
  c.width=Math.round(imgW*sc);c.height=Math.round(imgH*sc);c.dataset.s=sc;
  draw();document.getElementById('status').textContent=steps[0].p;
};
img.onerror=function(){
  document.getElementById('status').textContent=
    'Image load FAILED — /snapshot returned an error. Check host log.';
};
var _focusTimer=null;
function onFocus(v){
  var label=document.getElementById('focus-val');
  label.textContent=(v===null||v==='')?'auto':v;
  if(_focusTimer) clearTimeout(_focusTimer);
  _focusTimer=setTimeout(function(){
    fetch('/api/brio/focus',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({value:(v===null||v==='')?null:parseInt(v,10)})
    }).then(function(){
      setTimeout(reloadImage,300);
    });
  },150);
}
function reloadImage(){
  var src='/snapshot?'+Date.now();
  var tmp=new Image();
  tmp.onload=function(){
    img=tmp;
    draw();
  };
  tmp.src=src;
}
img.src='/snapshot?'+Date.now();
function S(){return parseFloat(c.dataset.s)||1}
function draw(){
  var s=S();ctx.drawImage(img,0,0,c.width,c.height);
  if(cc&&cr){
    ctx.strokeStyle='#fff';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(cc[0]*s,cc[1]*s,cr*s,0,Math.PI*2);ctx.stroke();
  }
  // Show the scale-reference line once both points are placed.
  if(scaleP1&&zoneR){
    // After zoneR is set we don't need the line any more, but
    // showing it briefly between sc1 and sc2 is helpful.
  }
  if(scaleP1&&!zoneR){
    ctx.fillStyle='#ff0';
    ctx.beginPath();ctx.arc(scaleP1[0]*s,scaleP1[1]*s,5,0,Math.PI*2);ctx.fill();
  }
  zones.forEach(function(z){
    ctx.strokeStyle='#0f0';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(z.cx*s,z.cy*s,z.r*s,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='#0f0';ctx.font='16px sans-serif';
    ctx.fillText(z.name,z.cx*s-20,z.cy*s-z.r*s-8);
  });
  // Drag preview for the in-progress zone.
  if(dragPos&&zoneR){
    ctx.strokeStyle='#ff0';ctx.lineWidth=2;ctx.setLineDash([5,5]);
    ctx.beginPath();ctx.arc(dragPos[0]*s,dragPos[1]*s,zoneR*s,0,Math.PI*2);
    ctx.stroke();ctx.setLineDash([]);
  }
}
function xy(e){
  var r=c.getBoundingClientRect();
  return [
    Math.round((e.clientX-r.left)*imgW/r.width),
    Math.round((e.clientY-r.top)*imgH/r.height),
  ];
}
function advance(){
  step++;
  if(step<steps.length){
    document.getElementById('status').textContent=steps[step].p;
  } else {
    document.getElementById('status').textContent='Saving...';
    fetch('/api/calibrate/save',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        circle_center:cc,
        circle_radius:cr,
        zone_radius_px:zoneR,
        zones:zones,
      })
    }).then(function(){
      document.getElementById('status').textContent=
        'Done! Return to main page.';
    });
  }
}

// Click handlers for the non-drag steps (cc, ce, sc1, sc2).
c.onclick=function(e){
  if(step>=steps.length) return;
  var st=steps[step];
  if(st.t==='zone') return;  // handled by mousedown/up below
  var p=xy(e),x=p[0],y=p[1];
  if(st.t==='cc'){
    cc=[x,y];
    advance();
  } else if(st.t==='ce'){
    cr=Math.round(Math.sqrt(Math.pow(x-cc[0],2)+Math.pow(y-cc[1],2)));
    advance();
  } else if(st.t==='sc1'){
    scaleP1=[x,y];
    advance();
  } else if(st.t==='sc2'){
    var dx=x-scaleP1[0],dy=y-scaleP1[1];
    var diameter=Math.sqrt(dx*dx+dy*dy);
    zoneR=Math.max(1,Math.round(diameter/2));
    advance();
  }
  draw();
};

// Drag-and-drop placement for zone steps.
c.onmousedown=function(e){
  if(step>=steps.length) return;
  var st=steps[step];
  if(st.t!=='zone'||!zoneR) return;
  dragPos=xy(e);
  draw();
};
c.onmousemove=function(e){
  if(!dragPos) return;
  dragPos=xy(e);
  draw();
};
c.onmouseup=function(e){
  if(step>=steps.length) return;
  var st=steps[step];
  if(st.t!=='zone'||!zoneR||!dragPos) return;
  var p=xy(e);
  zones.push({name:st.n,cx:p[0],cy:p[1],r:zoneR});
  dragPos=null;
  advance();
  draw();
};
c.onmouseleave=function(){
  // Cancel an in-progress drag if the mouse leaves the canvas.
  if(dragPos){dragPos=null;draw();}
};
</script></body></html>
